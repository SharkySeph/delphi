name: Release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.6.0)"
        required: true

permissions:
  contents: write

jobs:
  # ── Build wheels for each platform ─────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: "2_28"
            artifact: wheel-linux-x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: wheel-macos-arm64
          - os: macos-14
            target: x86_64-apple-darwin
            artifact: wheel-macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: wheel-windows-x86_64
    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.os }} ${{ matrix.target }})
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
          args: --release --out dist
          before-script-linux: |
            yum install -y alsa-lib-devel pkgconfig || true

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*.whl

  # ── Source distribution ────────────────────────────────────
  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ── Create GitHub Release ──────────────────────────────────
  release:
    needs: [build, sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect files
        run: |
          mkdir -p release
          find artifacts -name '*.whl' -exec cp {} release/ \;
          find artifacts -name '*.tar.gz' -exec cp {} release/ \;
          ls -la release/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: Delphi ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: release/*
