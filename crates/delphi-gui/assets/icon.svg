<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="#1e1e23"/>
  <circle cx="128" cy="128" r="115" fill="none" stroke="#56b6c2" stroke-width="3"/>

  <!-- Lyre body - outer frame -->
  <path d="M80,180 Q60,140 70,100 Q80,60 128,45 Q176,60 186,100 Q196,140 176,180"
        fill="none" stroke="#56b6c2" stroke-width="6" stroke-linecap="round"/>

  <!-- Lyre crossbar -->
  <line x1="78" y1="110" x2="178" y2="110" stroke="#e5c07b" stroke-width="5" stroke-linecap="round"/>

  <!-- Lyre strings -->
  <line x1="100" y1="110" x2="100" y2="185" stroke="#98c379" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="118" y1="110" x2="118" y2="190" stroke="#98c379" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="138" y1="110" x2="138" y2="190" stroke="#98c379" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="156" y1="110" x2="156" y2="185" stroke="#98c379" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Base bar -->
  <path d="M80,180 Q128,200 176,180" fill="none" stroke="#56b6c2" stroke-width="5" stroke-linecap="round"/>

  <!-- Musical note accent (top) -->
  <circle cx="128" cy="55" r="5" fill="#e5c07b"/>

  <!-- Text -->
  <text x="128" y="230" text-anchor="middle" font-family="sans-serif" font-weight="bold"
        font-size="24" fill="#abb2bf" letter-spacing="4">DELPHI</text>
</svg>
